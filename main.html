<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>My</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .main-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px #fff;
            z-index: 10;
            text-align: center;
        }

        .floating-text {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            animation: float linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-20vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="main-text">MUSYAAM</div>

    <script>
        const body = document.body;
        const count = 40;
        
        const phrases = ["One", "Love", "Forever", "My", "Love"];

        function createText(isInitial) {
            const span = document.createElement('span');
            span.className = 'floating-text';
            
            span.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            
            const duration = Math.random() * 8 + 4;
            const delay = isInitial ? Math.random() * -10 : 0; 
            
            span.style.left = Math.random() * 100 + 'vw';
            span.style.fontSize = (Math.random() * 1.2 + 0.5) + 'rem';
            span.style.animationDuration = duration + 's';
            span.style.animationDelay = delay + 's';
            
            body.appendChild(span);

            span.addEventListener('animationend', () => {
                span.remove();
                createText(false);
            });
        }

        for (let i = 0; i < count; i++) {
            createText(true);
        }
    </script>
</body>
</html>
